name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X github.com/octokraft/agent-vault/internal/cli.Version=${VERSION}"

          # Linux amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-linux-amd64 ./cmd/agent-vault
          # Linux arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-linux-arm64 ./cmd/agent-vault
          # macOS amd64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-darwin-amd64 ./cmd/agent-vault
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-darwin-arm64 ./cmd/agent-vault
          # Windows amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-windows-amd64.exe ./cmd/agent-vault
          # Windows arm64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/agent-vault-windows-arm64.exe ./cmd/agent-vault

      - name: Create archives
        run: |
          cd dist
          for f in agent-vault-linux-* agent-vault-darwin-*; do
            tar czf "${f}.tar.gz" "$f"
            rm "$f"
          done
          for f in agent-vault-windows-*; do
            zip "${f%.exe}.zip" "$f"
            rm "$f"
          done
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
